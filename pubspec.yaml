name: great_wall_ux
description: >-
  Rendering, palettes, and interaction layer for the Great Wall fractal
  encoder. The visual and interaction surface; the determinism-critical
  engine itself lives in great-wall-core.
version: 0.0.1
repository: https://github.com/yuri-svb/great-wall-ux
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  # Low-latency playback of the short bundled UI sound cues. Broad platform
  # coverage (desktop-first Linux/macOS/Windows, mobile, web).
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  shaders:
    - shaders/fractal.frag

  # Ubuntu Mono — the monospace face for the chrome surrounding the canvas
  # (great-wall-docs/great-wall-ux/SCOPE.md §"sober, but game-like").
  # Ubuntu Font Licence 1.0; see assets/fonts/LICENCE.txt.
  fonts:
    - family: UbuntuMono
      fonts:
        - asset: assets/fonts/UbuntuMono-Regular.ttf
        - asset: assets/fonts/UbuntuMono-Bold.ttf
          weight: 700

  # Short UI sound cues (synthesised homage; see assets/sounds/README.md).
  # Declared as a directory so dropping in / replacing a cue wav needs no
  # pubspec edit. Add a sibling line per future theme directory.
  assets:
    - assets/sounds/sober/

  # Localisation is configured via l10n.yaml; .arb files live in lib/src/l10n.
  generate: true
